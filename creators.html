<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creators — Solo Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main-wrap" style="padding-top:6rem;">
  <div style="margin-bottom:2rem;">
    <div class="section-eyebrow">// Creators</div>
    <h2 class="section-title" style="font-size:2rem;margin-bottom:0.5rem;">Indie Creators</h2>
    <p style="color:var(--text3);font-size:0.9rem;">Meet the solo developers, artists, and makers building on this platform.</p>
  </div>

  <div class="filters-row">
    <span class="filter-label">Filter:</span>
    <button class="chip active" onclick="toggleChip(this)">All</button>
    <button class="chip" onclick="toggleChip(this)">Game Devs</button>
    <button class="chip" onclick="toggleChip(this)">Artists</button>
    <button class="chip" onclick="toggleChip(this)">Musicians</button>
    <button class="chip" onclick="toggleChip(this)">Writers</button>
    <div class="filters-right">
      <select class="select-input">
        <option>Most projects</option>
        <option>Newest joined</option>
        <option>Most followed</option>
      </select>
    </div>
  </div>

  <!-- Creator cards loaded from Firestore users collection -->
  <div class="grid-4" id="creatorsGrid" style="margin-top:1.5rem;">
    <div style="grid-column:1/-1;text-align:center;padding:4rem 0;color:var(--text3);font-family:var(--font-mono);">
      // Creator directory coming soon — profiles are being built out.
    </div>
  </div>
</div>

<script type="module" src="firebase.js"></script>
<script src="app.js"></script>
<script src="nav.js"></script>
</body>
</html>
